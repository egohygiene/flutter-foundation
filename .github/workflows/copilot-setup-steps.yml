# =============================================================================
# Ego Hygiene — Copilot Environment Bootstrap
# =============================================================================
#
# This workflow prepares the repository environment when GitHub Copilot agents
# operate on the repository. It installs all required toolchains, validates
# repository structure, and ensures dependencies are available before AI
# agents attempt to modify code.
#
# Design goals:
# • deterministic builds
# • fast CI via caching
# • safe template behavior
# • AI-aware documentation validation
#
# =============================================================================

name: Copilot Environment Bootstrap

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  copilot-bootstrap:
    name: Copilot Environment Bootstrap
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # -----------------------------------------------------------------------
      # Checkout repository (with private AI submodules)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
          ssh-key: ${{ secrets.AI_DEPLOY_KEY }}
          ssh-strict: true

      # -----------------------------------------------------------------------
      # Validate repository configuration
      # -----------------------------------------------------------------------
      - name: Validate repository configuration files
        run: |
          echo "🔍 Validating repository configuration..."

          missing=0

          for file in commitlint.config.js .releaserc.json package.json; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing required file: $file"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required configuration files are missing."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Validate repository documentation
      # -----------------------------------------------------------------------
      - name: Validate documentation
        run: |
          echo "📚 Validating documentation..."

          if [ -f README.md ]; then
            echo "✅ README.md detected"
            head -n 40 README.md
          else
            echo "⚠️ README.md missing"
          fi

          if [ -f ARCHITECTURE.md ]; then
            echo ""
            echo "🏗️ ARCHITECTURE.md detected"
            head -n 60 ARCHITECTURE.md
          else
            echo ""
            echo "⚠️ ARCHITECTURE.md missing"
          fi

      # -----------------------------------------------------------------------
      # Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # -----------------------------------------------------------------------
      # Install pnpm
      # -----------------------------------------------------------------------
      - name: Install pnpm
        if: ${{ hashFiles('package.json') != '' }}
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # -----------------------------------------------------------------------
      # Install Node dependencies
      # Robust install that supports fresh template repos
      # -----------------------------------------------------------------------
      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "Lockfile detected — reproducible install"
            pnpm install --frozen-lockfile --prefer-offline
          else
            echo "No lockfile detected — generating pnpm-lock.yaml"
            pnpm install
          fi

      # -----------------------------------------------------------------------
      # Setup Flutter SDK
      # Using official recommended pattern
      # -----------------------------------------------------------------------
      - name: Setup Flutter
        id: flutter-action
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.0
          cache: true

      # -----------------------------------------------------------------------
      # Fix Git safe.directory issue for Flutter SDK
      # (required due to Git security restrictions)
      # -----------------------------------------------------------------------
      - name: Configure git safe.directory for Flutter
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: |
          git config --global --add safe.directory "${{ steps.flutter-action.outputs['CACHE-PATH'] }}"

      # -----------------------------------------------------------------------
      # Verify Flutter installation
      # -----------------------------------------------------------------------
      - name: Verify Flutter
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: flutter --version

      # -----------------------------------------------------------------------
      # Install Flutter dependencies
      # -----------------------------------------------------------------------
      - name: Install Flutter dependencies
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: flutter pub get

      # -----------------------------------------------------------------------
      # Validate AI factory structure
      # -----------------------------------------------------------------------
      - name: Validate AI factory structure
        run: |
          echo "🤖 Validating AI factory structure..."
      
          # Check if the AI submodule itself exists
          if [ ! -d "ai" ]; then
            echo "❌ AI submodule directory missing"
            exit 1
          fi
      
          # Warn if submodule might not be initialized
          if [ ! -d "ai/.git" ] && [ ! -f "ai/.git" ]; then
            echo "⚠️ AI submodule may not be initialized"
          fi
      
          # Validate important directories
          for dir in \
            ai/agents \
            ai/docs \
            ai/examples \
            ai/factory/templates \
            ai/factory/workflow
          do
            if [ -d "$dir" ]; then
              echo "✅ Found: $dir"
            else
              echo "⚠️ Missing: $dir"
            fi
          done

      # -----------------------------------------------------------------------
      # Verify toolchain
      # -----------------------------------------------------------------------
      - name: Verify toolchain
        run: |
          echo ""
          echo "================ TOOLCHAIN ================="

          if command -v node >/dev/null 2>&1; then
            echo "Node: $(node --version)"
          fi

          if command -v pnpm >/dev/null 2>&1; then
            echo "pnpm: $(pnpm --version)"
          fi

          if command -v flutter >/dev/null 2>&1; then
            echo "Flutter: $(flutter --version | head -n 1)"
          fi

          echo "============================================"
