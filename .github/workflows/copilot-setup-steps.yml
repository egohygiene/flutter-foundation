# =============================================================================
# Ego Hygiene — Copilot Environment Setup
# =============================================================================
#
# Location:
#   .github/workflows/copilot-setup-steps.yml
#
# Purpose
# -------
# Prepares the repository environment when GitHub Copilot coding agents
# operate on the repository.
#
# Copilot runs this workflow before attempting to modify code so it can:
#
# • access private submodules
# • understand repository documentation
# • install dependencies
# • verify toolchains
#
# Responsibilities
# ----------------
# • Checkout repository with SSH access to private submodules
# • Validate repository configuration files
# • Validate documentation (README + ARCHITECTURE)
# • Install Node dependencies using pnpm
# • Install Flutter dependencies when applicable
# • Validate AI factory directory structure
# • Verify installed toolchains
#
# =============================================================================

name: Copilot Setup Steps

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  copilot-setup:
    name: Copilot Environment Bootstrap
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:

      # -----------------------------------------------------------------------
      # Checkout repository (with SSH access to private submodules)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0
          persist-credentials: false
          ssh-key: ${{ secrets.AI_DEPLOY_KEY }}
          ssh-strict: true

      # -----------------------------------------------------------------------
      # Validate repository configuration
      # -----------------------------------------------------------------------
      - name: Validate repository configuration files
        run: |
          echo "🔍 Validating repository configuration..."

          missing=0

          for file in commitlint.config.js .releaserc.json package.json; do
            if [ -f "$file" ]; then
              echo "✅ Found: $file"
            else
              echo "❌ Missing required file: $file"
              missing=1
            fi
          done

          if [ "$missing" -eq 1 ]; then
            echo "::error::One or more required configuration files are missing."
            exit 1
          fi

      # -----------------------------------------------------------------------
      # Validate repository documentation
      # -----------------------------------------------------------------------
      - name: Validate documentation
        run: |
          echo "📚 Validating repository documentation..."

          if [ -f "README.md" ]; then
            echo "✅ README.md found"
            echo ""
            echo "================ README Preview ================"
            head -n 40 README.md
            echo "================================================"
          else
            echo "⚠️ README.md not found"
          fi

          if [ -f "ARCHITECTURE.md" ]; then
            echo ""
            echo "✅ ARCHITECTURE.md found"
            echo ""
            echo "============= ARCHITECTURE Preview ============="
            head -n 60 ARCHITECTURE.md
            echo "================================================"
          else
            echo ""
            echo "⚠️ ARCHITECTURE.md not found"
            echo "Consider generating one using the architecture agent."
          fi

      # -----------------------------------------------------------------------
      # Setup Node.js
      # -----------------------------------------------------------------------
      - name: Setup Node.js
        if: ${{ hashFiles('package.json') != '' }}
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      # -----------------------------------------------------------------------
      # Install pnpm
      # -----------------------------------------------------------------------
      - name: Install pnpm
        if: ${{ hashFiles('package.json') != '' }}
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      # -----------------------------------------------------------------------
      # Install Node dependencies
      # -----------------------------------------------------------------------
      - name: Install Node dependencies
        if: ${{ hashFiles('package.json') != '' }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "Lockfile detected, performing reproducible install"
            pnpm install --frozen-lockfile --prefer-offline
          else
            echo "No lockfile detected, generating pnpm-lock.yaml"
            pnpm install
          fi
          
      # -----------------------------------------------------------------------
      # Setup Flutter SDK
      # -----------------------------------------------------------------------
      - name: Setup Flutter
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        id: flutter-action
        uses: subosito/flutter-action@v2
        with:
          # flutter-version: "3.41.0"
          architecture: x64
          cache: true
      
      # -----------------------------------------------------------------------
      # Mark Flutter SDK as safe for git
      # -----------------------------------------------------------------------
      - name: Configure git safe.directory for Flutter
        run: |
          git config --global --add safe.directory ${{ steps.flutter-action.outputs.FLUTTER_ROOT }}
      
      # -----------------------------------------------------------------------
      # Verify Flutter
      # -----------------------------------------------------------------------
      - name: Verify Flutter
        run: flutter --version

      # -----------------------------------------------------------------------
      # Install Flutter dependencies
      # -----------------------------------------------------------------------
      - name: Install Flutter dependencies
        if: ${{ hashFiles('pubspec.yaml') != '' }}
        run: flutter pub get

      # -----------------------------------------------------------------------
      # Validate AI factory directory structure
      # -----------------------------------------------------------------------
      - name: Validate AI agent directories
        run: |
          echo "🤖 Validating AI agent directories..."

          for dir in \
            ai/factory/workflow \
            ai/factory/templates \
            ai/factory/prompts \
            ai/factory/agents
          do
            if [ -d "$dir" ]; then
              echo "✅ Found: $dir"
            else
              echo "⚠️ Missing: $dir — ensure the AI submodule is initialized."
            fi
          done

      # -----------------------------------------------------------------------
      # Verify toolchain
      # -----------------------------------------------------------------------
      - name: Verify toolchain
        run: |
          echo ""
          echo "====================================="
          echo "Toolchain Verification"
          echo "====================================="

          if command -v node >/dev/null 2>&1; then
            echo ""
            echo "Node:"
            node --version
          fi

          if command -v pnpm >/dev/null 2>&1; then
            echo ""
            echo "pnpm:"
            pnpm --version
          fi

          if command -v flutter >/dev/null 2>&1; then
            echo ""
            echo "Flutter:"
            flutter --version
          fi

          echo ""
          echo "Copilot environment ready."
