name: Flutter

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true
      - run: flutter --version
