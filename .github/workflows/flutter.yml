name: Flutter

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  flutter:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.AI_DEPLOY_KEY }}
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: subosito/flutter-action@v2
        with:
          flutter-version-file: .fvmrc
          cache: true
      - run: flutter --version
