# =============================================================================
# Ego Hygiene — Commit Message Linting
# =============================================================================
#
# Location:
#   .github/workflows/commitlint.yml
#
# Purpose
# -------
# This workflow validates commit messages against the repository's
# Conventional Commit rules using Commitlint.
#
# Enforcing commit standards enables:
#
# • consistent commit history
# • automated semantic versioning
# • changelog generation
# • semantic-release compatibility
#
# The environment setup is handled by the shared composite action located at:
#
#   .github/actions/setup-environment/action.yml
#
# =============================================================================

name: Commitlint

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read

    steps:

      # -----------------------------------------------------------------------
      # Setup repository environment
      # -----------------------------------------------------------------------
      - name: Setup repository environment
        uses: ./.github/actions/setup-environment
        with:
          ssh-private-key: ${{ secrets.AI_DEPLOY_KEY }}

      # -----------------------------------------------------------------------
      # Run Commitlint
      # -----------------------------------------------------------------------
      - name: Run Commitlint
        uses: wagoid/commitlint-github-action@v6
